<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>n0un</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            margin: 0;
            display: flex;
            flex-direction: column; /* Stack logo and link */
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            cursor: default;
        }

        /* The container for the logo */
        .logo-box {
            font-size: 3.5rem;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            letter-spacing: -2px;
            margin-bottom: 10px; /* Space between logo and link */
        }

        /* The hidden letters */
        .fade-text {
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            pointer-events: none;
        }

        /* The central slashed zero */
        .symbol {
            color: #fff;
            padding: 0 10px;
        }

        /* Reveal n and un when hovering over the logo-box */
        .logo-box:hover .fade-text {
            opacity: 1;
        }

        /* The Link directly below the logo */
        .archive-link {
            font-size: 0.8rem;
            color: #666; /* Subdued grey */
            text-decoration: none;
            letter-spacing: 4px;
            transition: color 0.4s, letter-spacing 0.4s;
            text-transform: uppercase;
        }

        .archive-link:hover {
            color: #fff;
            letter-spacing: 6px; /* Subtle expansion on hover */
        }
    </style>
</head>
<body>

    <div class="logo-box">
        <span class="fade-text">n</span>
        <span class="symbol">Ø</span>
        <span class="fade-text">un</span>
    </div>

    <a href="https://drive.google.com/drive/folders/1hButlq3GQ_U0oimgodWiWCJ38m9Xkp62?usp=drive_link" class="archive-link">DISPLACED</a>


<div id="terminal-container" style="text-align: center; margin-top: 20vh; font-family: monospace;">
  
  <div id="input-line" style="display: inline-block; position: relative;">
    <span style="color: white; margin-right: 10px;">></span>
    <input type="text" id="query-input" autofocus 
           style="background: transparent; color: white; border: none; outline: none; font-family: monospace; font-size: 1.2rem; width: 200px; text-transform: uppercase;" 
           onkeydown="if(event.key==='Enter') processQuery()">
    <span class="cursor" style="color: white; font-weight: bold; position: absolute; right: -5px; bottom: 2px;">_</span>
  </div>

  <div id="response" style="margin-top: 30px; color: #555; font-size: 0.9rem;">
    READY FOR INPUT_
  </div>

</div>

<style>
  /* The Blinking Animation */
  .cursor {
    animation: blink 1s step-end infinite;
  }
  @keyframes blink {
    from, to { opacity: 1; }
    50% { opacity: 0; }
  }
  /* Remove mobile blue highlight on tap */
  input { -webkit-tap-highlight-color: transparent; }
</style>

<script>
  function processQuery() {
    const input = document.getElementById("query-input");
    const val = input.value.toUpperCase().trim();
    const resp = document.getElementById("response");

    // Clear input for next use
    input.value = "";

    // 1. THE HELLO WORLD LINK
    if (val === "HELLO") {
      resp.innerHTML = "ACCESSING_ HELLO_WORLD.ARC";
      resp.style.color = "white";
      setTimeout(() => { 
        window.location.href = "https://drive.proton.me/urls/6B2F8EZYV8#gJcrCVqot1HC"; 
      }, 1000);
    } 

    // 2. THE FULL ARCHIVE (Optional - change the code/link as needed)
    else if (val === "DISPLACED") {
      resp.innerHTML = "RECOVERING_ MAIN_ARCHIVE";
      resp.style.color = "white";
      setTimeout(() => { 
        window.location.href = "YOUR_MAIN_PROTON_FOLDER_LINK"; 
      }, 1000);
    } 

    // 3. FUTURE EASTER EGG EXAMPLE (Just copy-paste this block for new codes)
    else if (val === "LDN_01") {
      resp.innerHTML = "INTERCEPTING_ COORDINATES_v2";
      resp.style.color = "#00FF41"; // Matrix Green for a special egg
      setTimeout(() => { 
        window.location.href = "LINK_TO_A_MAP_OR_IMAGE"; 
      }, 1000);
    } 
// 4. THIS IS A TEST TO 123
  else if (val === "234") {
      resp.innerHTML = "LOADING";
      resp.style.color = "#00FF41"; // Matrix Green for a special egg
      setTimeout(() => { 
        window.location.href = "https://drive.proton.me/urls/HA0V5PN2KG#nSNdPnxzqsHR"; 
      }, 1000);
    } 

    // ERROR HANDLING
    else if (val === "") {
      resp.innerHTML = "NULL_INPUT";
      resp.style.color = "#555";
    }
    else {
      resp.innerHTML = "ERROR: CODE_INVALID_OR_DISPLACED";
      resp.style.color = "red";
    }
  }
</script>

</body>
</html>
