<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>n0un</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* Start from top to control spacing */
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            cursor: default;
            transition: filter 0.5s ease;
            padding-top: 10vh; /* Initial top padding */
        }

        /* --- BRANDING GROUP --- */
        .brand-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20vh; /* THE GAP: Spaces branding away from terminal */
        }

        .logo-box {
            font-size: 3.5rem;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            letter-spacing: -2px;
            margin-bottom: 20px; /* Space between Logo and Displaced link */
        }

        .fade-text {
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            pointer-events: none;
        }

        .symbol {
            color: #fff;
            padding: 0 10px;
        }

        .logo-box:hover .fade-text {
            opacity: 1;
        }

        .archive-link {
            font-size: 0.8rem;
            color: #666;
            text-decoration: none;
            letter-spacing: 4px;
            transition: color 0.4s, letter-spacing 0.4s;
            text-transform: uppercase;
            cursor: pointer;
        }

        .archive-link:hover {
            color: #fff;
            letter-spacing: 6px;
        }

        /* --- TERMINAL GROUP --- */
        #terminal-container { 
            text-align: center; 
            font-family: monospace; 
        }

        #input-line { 
            display: flex; 
            align-items: center;
            justify-content: center;
            position: relative; 
            margin-bottom: 25px; 
        }

        #query-input { 
            background: transparent; 
            color: white; 
            /* THE BOX: Subtle dashed border */
            border: 1px dashed #333; 
            outline: none; 
            font-family: monospace; 
            font-size: 1.2rem; 
            width: 240px; 
            text-transform: uppercase; 
            padding: 10px;
            transition: all 0.3s ease;
            text-align: center;
        }

        /* Box brightens when user clicks to type */
        #query-input:focus {
            border: 1px solid #666;
            background-color: rgba(255, 255, 255, 0.03);
        }

        .cursor { 
            animation: blink 1s step-end infinite; 
            color: white; 
            font-weight: bold; 
            margin-left: 5px;
        }

        @keyframes blink { from, to { opacity: 1; } 50% { opacity: 0; } }

        #response {
            color: #444; 
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* --- MODAL STYLES --- */
        .modal {
            display: none; 
            position: fixed;
            z-index: 1000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
